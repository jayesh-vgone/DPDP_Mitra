version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: dpdp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dpdp
      POSTGRES_PASSWORD: dpdp
      POSTGRES_DB: dpdp
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
