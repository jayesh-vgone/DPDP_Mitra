# Render Blueprint — backend (FastAPI)
# Database: Supabase Postgres (already provisioned — NOT managed by Render)
#
# Deploy via Render dashboard: New → Blueprint → point at this repo.
# See DEPLOYMENT.md for the full step-by-step guide.
#
# Secrets marked `sync: false` must be set manually in the Render dashboard
# (Environment tab of the dpdp-backend service) after the Blueprint is created.
#
#   DATABASE_URL       — Supabase direct connection string (see DEPLOYMENT.md §3)
#   GROQ_API_KEY       — from console.groq.com
#   COHERE_API_KEY     — from cohere.com
#   CORS_ORIGINS       — your Vercel frontend URL (https://<app>.vercel.app)
#   RESEND_API_KEY     — from resend.com (leave unset until a sending domain is verified)

services:
  - type: web
    name: dpdp-backend
    runtime: python
    plan: free               # free tier spins down after ~15 min idle; cold start ~60 s
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false           # Supabase direct connection string — set in Render dashboard
      - key: APP_ENV
        value: production
      # Cross-site session cookies: SameSite=None + Secure so the browser sends them
      # on credentialed fetch() from the Vercel frontend (different domain).
      # With the recommended Vercel /api rewrite-proxy these are also correct —
      # the cookie is stored under the Vercel domain but SameSite=None is harmless.
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: JWT_SECRET
        generateValue: true   # reserved future hook (third-party Bearer-token auth)
      - key: LLM_PROVIDER
        value: groq
      - key: STT_PROVIDER
        value: groq
      - key: TTS_PROVIDER
        value: browser
      - key: EMBEDDING_PROVIDER
        value: cohere
      # Email OTP: currently disabled — flip to true once a Resend sending domain is
      # verified and the `from` address in backend/providers/email_sender.py is updated.
      - key: EMAIL_VERIFICATION_ENABLED
        value: "false"
      - key: GROQ_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false           # set to your Vercel URL, e.g. https://eduprivacy.vercel.app
      - key: RESEND_API_KEY
        sync: false           # leave unset until a Resend sending domain is verified
